<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Research Paper Simplifier</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <!-- LOGO (fixed filename) -->
        <img src="{{ url_for('static', filename='logo23.png.png') }}" alt="Logo" class="logo">

        <h1>Welcome Back!</h1>

        <p>Login to continue simplifying research papers with AI.</p>

        <!-- FIXED FORM (now inside design properly) -->
        <form action="{{ url_for('login') }}" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <!-- REGISTER LINK -->
        <div class="register-link">

            Don't have an account?

            <a href="{{ url_for('register') }}">
                Create Account
            </a>

        </div>

    </div>

</div>

</body>
</html>
